<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Libros</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <h1 class="text-center text-primary">
        📚 Gestión de Libros
    </h1>

    <div class="card shadow mt-4">

        <div class="card-body">

            <div class="row">

                <div class="col-md-3">
                    <input
                    type="text"
                    id="titulo"
                    class="form-control"
                    placeholder="Título">
                </div>

                <div class="col-md-3">
                    <input
                    type="text"
                    id="autor"
                    class="form-control"
                    placeholder="Autor">
                </div>

                <div class="col-md-3">
                    <input
                    type="text"
                    id="categoria"
                    class="form-control"
                    placeholder="Categoría">
                </div>

                <div class="col-md-2">
                    <input
                    type="number"
                    id="anio"
                    class="form-control"
                    placeholder="Año">
                </div>

                <div class="col-md-1">
                    <button
                    class="btn btn-success"
                    onclick="agregarLibro()">
                    +
                    </button>
                </div>

            </div>

        </div>

    </div>

    <div class="mt-4">

        <input
        type="text"
        id="buscar"
        class="form-control"
        placeholder="Buscar libro..."
        onkeyup="buscarLibro()">

    </div>

    <div class="card shadow mt-4">

        <div class="card-body">

            <table class="table table-striped">

                <thead class="table-primary">

                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Autor</th>
                    <th>Categoría</th>
                    <th>Año</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>

                </thead>

                <tbody id="tablaLibros">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="js/libros.js"></script>

</body>
</html>
