<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Virtual - Libros</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<button class="sidebar-toggle" id="sidebarToggle">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<aside class="sidebar" id="sidebar">

    <div class="sidebar-brand">
        <span class="brand-icon-badge"><i class="bi bi-journal-bookmark-fill"></i></span>
        <span class="brand-text">Biblioteca<br>Virtual</span>
    </div>

    <nav class="sidebar-nav">
        <a href="index.html" class="nav-item">
            <i class="bi bi-speedometer2 nav-icon"></i> Dashboard
        </a>
        <a href="libros.html" class="nav-item active">
            <i class="bi bi-book-half nav-icon"></i> Libros
        </a>
        <a href="usuarios.html" class="nav-item">
            <i class="bi bi-people-fill nav-icon"></i> Usuarios
        </a>
        <a href="prestamos.html" class="nav-item">
            <i class="bi bi-arrow-repeat nav-icon"></i> Préstamos
        </a>
        <a href="reportes.html" class="nav-item">
            <i class="bi bi-clipboard-data nav-icon"></i> Reportes
        </a>
    </nav>

    <button class="btn-logout" onclick="cerrarSesion()">
        <i class="bi bi-box-arrow-right nav-icon"></i> Cerrar sesión
    </button>

</aside>

<main class="main-content">

    <h1 class="titulo-pagina"><i class="bi bi-book-half"></i> Gestión de Libros</h1>

    <div class="card-panel">

        <div class="row g-3">

            <div class="col-md-3">
                <input type="text" id="titulo" class="form-control" placeholder="Título">
            </div>

            <div class="col-md-3">
                <input type="text" id="autor" class="form-control" placeholder="Autor">
            </div>

            <div class="col-md-3">
                <input type="text" id="categoria" class="form-control" placeholder="Categoría">
            </div>

            <div class="col-md-2">
                <input type="number" id="anio" class="form-control" placeholder="Año">
            </div>

            <div class="col-md-1">
                <button class="btn btn-agregar w-100" onclick="agregarLibro()">+</button>
            </div>

        </div>

    </div>

    <div class="buscador-wrapper">
        <input type="text" id="buscar" class="form-control" placeholder="Buscar libro..." onkeyup="buscarLibro()">
    </div>

    <div class="modal fade" id="modalEditarLibro" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Editar Libro</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" id="editId">

                    <div class="mb-3">
                        <label class="form-label">Título</label>
                        <input type="text" id="editTitulo" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Autor</label>
                        <input type="text" id="editAutor" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Categoría</label>
                        <input type="text" id="editCategoria" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Año</label>
                        <input type="number" id="anio" class="form-control" placeholder="Año" min="1000" max="2100">
                    </div>

                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-agregar" onclick="guardarEdicionLibro()">Guardar cambios</button>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="modalConfirmarEliminarLibro" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Confirmar eliminación</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <p>¿Deseas eliminar este libro? Esta acción no se puede deshacer.</p>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-eliminar" onclick="confirmarEliminarLibro()">Eliminar</button>
                </div>

            </div>
        </div>
    </div>

    <div class="card-panel">

        <div class="table-responsive">

            <table class="table tabla-datos">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Título</th>
                        <th>Autor</th>
                        <th>Categoría</th>
                        <th>Año</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody id="tablaLibros"></tbody>

            </table>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/libros.js"></script>

<script>

    document.getElementById("sidebarToggle").addEventListener("click", () => {
        document.getElementById("sidebar").classList.toggle("abierto");
        document.getElementById("sidebarOverlay").classList.toggle("activo");
    });

    document.getElementById("sidebarOverlay").addEventListener("click", () => {
        document.getElementById("sidebar").classList.remove("abierto");
        document.getElementById("sidebarOverlay").classList.remove("activo");
    });

</script>

</body>
</html>
