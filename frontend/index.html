<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca Virtual - Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/estilos.css">

</head>
<body>

<button class="sidebar-toggle" id="sidebarToggle">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<aside class="sidebar" id="sidebar">

    <div class="sidebar-brand">
        <span class="brand-icon-badge"><i class="bi bi-journal-bookmark-fill"></i></span>
        <span class="brand-text">Biblioteca<br>Virtual</span>
    </div>

    <nav class="sidebar-nav">
        <a href="index.html" class="nav-item active">
            <i class="bi bi-speedometer2 nav-icon"></i> Dashboard
        </a>
        <a href="libros.html" class="nav-item">
            <i class="bi bi-book-half nav-icon"></i> Libros
        </a>
        <a href="usuarios.html" class="nav-item">
            <i class="bi bi-people-fill nav-icon"></i> Usuarios
        </a>
        <a href="prestamos.html" class="nav-item">
            <i class="bi bi-arrow-repeat nav-icon"></i> Préstamos
        </a>
        <a href="reportes.html" class="nav-item">
            <i class="bi bi-clipboard-data nav-icon"></i> Reportes
        </a>
    </nav>

    <button class="btn-logout" onclick="cerrarSesion()">
        <i class="bi bi-box-arrow-right nav-icon"></i> Cerrar sesión
    </button>

</aside>

<main class="main-content">

    <h1 class="titulo-pagina"><i class="bi bi-speedometer2"></i> Panel de control</h1>

    <div class="stats-grid">

        <div class="stat-card">
            <div class="icon-badge azul"><i class="bi bi-book-half"></i></div>
            <div class="stat-numero" id="totalLibros">0</div>
            <div class="stat-label">Libros</div>
        </div>

        <div class="stat-card">
            <div class="icon-badge dorado"><i class="bi bi-people-fill"></i></div>
            <div class="stat-numero" id="totalUsuarios">0</div>
            <div class="stat-label">Usuarios</div>
        </div>

        <div class="stat-card">
            <div class="icon-badge oscuro"><i class="bi bi-arrow-repeat"></i></div>
            <div class="stat-numero" id="totalPrestamos">0</div>
            <div class="stat-label">Préstamos</div>
        </div>

    </div>

    <div class="accesos-grid">

        <a href="libros.html" class="acceso-card">
            <div class="icon-badge azul"><i class="bi bi-book-half"></i></div>
            Libros
        </a>

        <a href="usuarios.html" class="acceso-card">
            <div class="icon-badge dorado"><i class="bi bi-people-fill"></i></div>
            Usuarios
        </a>

        <a href="prestamos.html" class="acceso-card">
            <div class="icon-badge oscuro"><i class="bi bi-arrow-repeat"></i></div>
            Préstamos
        </a>

        <a href="reportes.html" class="acceso-card">
            <div class="icon-badge azul"><i class="bi bi-clipboard-data"></i></div>
            Reportes
        </a>

    </div>

</main>

<script src="js/dashboard.js"></script>

<script>

    document.getElementById("sidebarToggle").addEventListener("click", () => {
        document.getElementById("sidebar").classList.toggle("abierto");
        document.getElementById("sidebarOverlay").classList.toggle("activo");
    });

    document.getElementById("sidebarOverlay").addEventListener("click", () => {
        document.getElementById("sidebar").classList.remove("abierto");
        document.getElementById("sidebarOverlay").classList.remove("activo");
    });

</script>

</body>
</html>
