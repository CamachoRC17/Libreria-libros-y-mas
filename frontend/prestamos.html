<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Préstamos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-4">

<h1 class="text-center text-primary">
🔄 Gestión de Préstamos
</h1>

<div class="card shadow mt-4">

<div class="card-body">

<div class="row">

<div class="col-md-5">

<label>Usuario</label>

<select id="usuario" class="form-select">

</select>

</div>

<div class="col-md-5">

<label>Libro Disponible</label>

<select id="libro" class="form-select">

</select>

</div>

<div class="col-md-2">

<label>&nbsp;</label>

<button
class="btn btn-success w-100"
onclick="realizarPrestamo()">

Prestar

</button>

</div>

</div>

</div>

</div>

<div class="card shadow mt-4">

<div class="card-body">

<table class="table table-striped">

<thead class="table-primary">

<tr>

<th>ID</th>
<th>Usuario</th>
<th>Libro</th>
<th>Fecha</th>
<th>Estado</th>
<th>Acción</th>

</tr>

</thead>

<tbody id="tablaPrestamos">

</tbody>

</table>

</div>

</div>

</div>

<script src="js/prestamos.js"></script>

</body>
</html>
