<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Virtual - Préstamos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<button class="sidebar-toggle" id="sidebarToggle">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<aside class="sidebar" id="sidebar">

    <div class="sidebar-brand">
        <span class="brand-icon-badge"><i class="bi bi-journal-bookmark-fill"></i></span>
        <span class="brand-text">Biblioteca<br>Virtual</span>
    </div>

    <nav class="sidebar-nav">
        <a href="index.html" class="nav-item">
            <i class="bi bi-speedometer2 nav-icon"></i> Dashboard
        </a>
        <a href="libros.html" class="nav-item">
            <i class="bi bi-book-half nav-icon"></i> Libros
        </a>
        <a href="usuarios.html" class="nav-item">
            <i class="bi bi-people-fill nav-icon"></i> Usuarios
        </a>
        <a href="prestamos.html" class="nav-item active">
            <i class="bi bi-arrow-repeat nav-icon"></i> Préstamos
        </a>
        <a href="reportes.html" class="nav-item">
            <i class="bi bi-clipboard-data nav-icon"></i> Reportes
        </a>
    </nav>

    <button class="btn-logout" onclick="cerrarSesion()">
        <i class="bi bi-box-arrow-right nav-icon"></i> Cerrar sesión
    </button>

</aside>

<main class="main-content">

    <h1 class="titulo-pagina"><i class="bi bi-arrow-repeat"></i> Gestión de Préstamos</h1>

    <div class="card-panel">

        <div class="row g-3 align-items-end">

            <div class="col-md-5">
                <label class="form-label">Usuario</label>
                <select id="usuario" class="form-select"></select>
            </div>

            <div class="col-md-5">
                <label class="form-label">Libro Disponible</label>
                <select id="libro" class="form-select"></select>
            </div>

            <div class="col-md-2">
                <button class="btn btn-agregar w-100" onclick="realizarPrestamo()">Prestar</button>
            </div>

        </div>

    </div>

    <div class="modal fade" id="modalConfirmarDevolucion" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Confirmar devolución</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <p>¿Deseas marcar este libro como devuelto?</p>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-agregar" onclick="confirmarDevolucion()">Devolver</button>
                </div>

            </div>
        </div>
    </div>

    <div class="card-panel">

        <div class="table-responsive">

            <table class="table tabla-datos">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Usuario</th>
                        <th>Libro</th>
                        <th>Fecha</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>

                <tbody id="tablaPrestamos"></tbody>

            </table>

        </div>

    </div>

    <div class="modal fade" id="modalAlerta" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Aviso</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <p id="mensajeAlerta"></p>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-agregar" data-bs-dismiss="modal">Aceptar</button>
                </div>

            </div>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script src="js/prestamos.js"></script>


<script>

    document.getElementById("sidebarToggle").addEventListener("click", () => {
        document.getElementById("sidebar").classList.toggle("abierto");
        document.getElementById("sidebarOverlay").classList.toggle("activo");
    });

    document.getElementById("sidebarOverlay").addEventListener("click", () => {
        document.getElementById("sidebar").classList.remove("abierto");
        document.getElementById("sidebarOverlay").classList.remove("activo");
    });

</script>

</body>
</html>
