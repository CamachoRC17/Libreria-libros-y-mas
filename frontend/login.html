<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca Virtual - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/estilos.css">

</head>
<body class="login-body">

<div class="login-wrapper">

    <div class="login-card">

        <div class="login-brand">
            <span class="brand-icon-badge login-icon"><i class="bi bi-journal-bookmark-fill"></i></span>
            <h1 class="login-titulo">Biblioteca Virtual</h1>
            <p class="login-subtitulo">Panel administrativo</p>
        </div>

        <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input type="text" id="usuario" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" id="password" class="form-control">
        </div>

        <script src="https://www.google.com/recaptcha/api.js?render=6LeeFkgtAAAAAKVwtO3GWvqHXySPQf4WbxoXlgiL"></script>

        <button class="btn btn-agregar w-100" onclick="iniciarSesion()">
            Ingresar
        </button>

        <p id="mensaje" class="login-mensaje"></p>

    </div>

</div>

<script src="js/login.js"></script>
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

</body>
</html>
