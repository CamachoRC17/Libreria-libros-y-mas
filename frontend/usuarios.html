<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <h1 class="text-center text-primary">
        👥 Gestión de Usuarios
    </h1>

    <div class="card shadow mt-4">
        <div class="card-body">

            <div class="row">

                <div class="col-md-4">
                    <input type="text"
                    id="nombre"
                    class="form-control"
                    placeholder="Nombre completo">
                </div>

                <div class="col-md-3">
                    <input type="text"
                    id="documento"
                    class="form-control"
                    placeholder="Documento">
                </div>

                <div class="col-md-4">
                    <input type="email"
                    id="correo"
                    class="form-control"
                    placeholder="Correo electrónico">
                </div>

                <div class="col-md-1">
                    <button
                    class="btn btn-success"
                    onclick="agregarUsuario()">
                    +
                    </button>
                </div>

            </div>

        </div>
    </div>

    <div class="mt-4">
        <input type="text"
        id="buscar"
        class="form-control"
        placeholder="Buscar usuario..."
        onkeyup="buscarUsuario()">
    </div>

    <div class="card shadow mt-4">
        <div class="card-body">

            <table class="table table-striped">

                <thead class="table-primary">

                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Documento</th>
                        <th>Correo</th>
                        <th>Acciones</th>
                    </tr>

                </thead>

                <tbody id="tablaUsuarios"></tbody>

            </table>

        </div>
    </div>

</div>

<script src="js/usuarios.js"></script>

</body>
</html>
